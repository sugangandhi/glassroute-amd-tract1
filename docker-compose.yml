services:
  backend:
    build: ./backend
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
